site_name: Web Dev and Magento Learning Site
site_description: Reference-first notes for web development, PHP, Magento, and runtime/devops.
repo_name: web-dev-magento-learning
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue grey
      accent: amber
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Lesson 1: when-you-open-a-website-who-is-talking.md
